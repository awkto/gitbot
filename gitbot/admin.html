<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitBot Admin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0d1117; color: #c9d1d9; }
  .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
  h1 { font-size: 1.5rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
  h1 .dot { width: 10px; height: 10px; border-radius: 50%; background: #3fb950; display: inline-block; }
  h1 .dot.error { background: #f85149; }
  h2 { font-size: 1.1rem; color: #8b949e; margin: 1.5rem 0 0.5rem; border-bottom: 1px solid #21262d; padding-bottom: 0.3rem; }

  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0.75rem; margin-bottom: 1rem; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 0.75rem; }
  .card .label { color: #8b949e; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .card .value { font-size: 1.6rem; font-weight: 600; color: #e6edf3; margin-top: 0.2rem; }
  .card .sub { font-size: 0.7rem; color: #8b949e; margin-top: 0.2rem; }

  .config-row { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
  .config-item { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 0.4rem 0.6rem; font-size: 0.8rem; }
  .config-item .label { color: #8b949e; font-size: 0.65rem; }
  .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.7rem; font-weight: 500; }
  .badge.ok { background: #238636; color: #fff; }
  .badge.warn { background: #9e6a03; color: #fff; }
  .badge.error { background: #da3633; color: #fff; }
  .badge.running { background: #1f6feb; color: #fff; }

  .btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 0.3rem 0.6rem; border-radius: 6px; cursor: pointer; font-size: 0.75rem; }
  .btn:hover { background: #30363d; }
  .btn.primary { background: #238636; border-color: #2ea043; }

  /* Workflow table */
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  th { text-align: left; color: #8b949e; font-weight: 500; padding: 0.4rem 0.5rem; border-bottom: 1px solid #30363d; }
  td { padding: 0.4rem 0.5rem; border-bottom: 1px solid #21262d; }
  tr.clickable { cursor: pointer; }
  tr.clickable:hover { background: #161b22; }
  tr.selected { background: #1c2333; border-left: 3px solid #1f6feb; }

  /* Workflow detail panel */
  .detail-panel { background: #161b22; border: 1px solid #30363d; border-radius: 6px; margin-bottom: 1rem; overflow: hidden; }
  .detail-header { padding: 0.75rem 1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #21262d; }
  .detail-header h3 { font-size: 1rem; color: #e6edf3; }
  .detail-body { padding: 0.75rem 1rem; }
  .detail-meta { display: flex; gap: 1.5rem; flex-wrap: wrap; font-size: 0.8rem; color: #8b949e; margin-bottom: 0.75rem; }
  .detail-meta span { display: flex; align-items: center; gap: 0.3rem; }

  /* Phase timeline */
  .phases { display: flex; gap: 0.25rem; margin-bottom: 0.75rem; }
  .phase { padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.7rem; font-weight: 500; text-transform: uppercase; }
  .phase.done { background: #238636; color: #fff; }
  .phase.active { background: #1f6feb; color: #fff; animation: pulse 1.5s infinite; }
  .phase.pending { background: #21262d; color: #484f58; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }

  /* Steps */
  .step { border: 1px solid #21262d; border-radius: 6px; margin-bottom: 0.5rem; overflow: hidden; }
  .step-header { padding: 0.5rem 0.75rem; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .step-header:hover { background: #1c2333; }
  .step-header .step-title { font-size: 0.8rem; font-weight: 500; }
  .step-header .step-meta { font-size: 0.7rem; color: #8b949e; display: flex; gap: 0.75rem; align-items: center; }
  .step-body { display: none; padding: 0.5rem 0.75rem; border-top: 1px solid #21262d; background: #0d1117; font-size: 0.75rem; }
  .step-body.open { display: block; }
  .step.completed .step-header { border-left: 3px solid #238636; }
  .step.running .step-header { border-left: 3px solid #1f6feb; }
  .step.failed .step-header { border-left: 3px solid #da3633; }

  /* Actions within a step */
  .action { padding: 0.3rem 0; border-bottom: 1px solid #161b22; font-family: monospace; font-size: 0.7rem; }
  .action:last-child { border-bottom: none; }
  .action .tool-name { color: #d2a8ff; font-weight: 500; }
  .action .result { color: #8b949e; margin-left: 1rem; display: block; white-space: pre-wrap; word-break: break-all; }
  .action.error .tool-name { color: #f85149; }

  /* Event log */
  .events { max-height: 300px; overflow-y: auto; }
  .event { padding: 0.25rem 0.5rem; font-size: 0.75rem; font-family: monospace; border-bottom: 1px solid #21262d; }
  .event .ts { color: #484f58; margin-right: 0.5rem; }
  .event.warn { border-left: 3px solid #9e6a03; }
  .event.error { border-left: 3px solid #da3633; }
  .event.info { border-left: 3px solid #388bfd; }

  /* Setup form */
  #setupForm { display:none;background:#161b22;border:1px solid #30363d;border-radius:6px;padding:1rem;margin-bottom:1rem; }
  #setupForm input, #setupForm select { width:100%;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:0.3rem;border-radius:4px;font-size:0.8rem; }
  #setupForm label { font-size: 0.7rem; color: #8b949e; }

  .hidden { display: none; }
</style>
</head>
<body>
<div class="container">
  <h1><span class="dot" id="statusDot"></span> GitBot Admin <span id="versionBadge" style="font-size:0.7rem;color:#8b949e"></span></h1>

  <!-- Setup banner -->
  <div id="setupBanner" class="hidden" style="background:#1c1612;border:1px solid #9e6a03;border-radius:6px;padding:1rem;margin-bottom:1rem">
    <strong>Setup Required</strong> — Configure GitLab and LLM settings below.
  </div>

  <!-- Config bar -->
  <div class="config-row" id="configRow"></div>
  <div style="margin-bottom:0.5rem">
    <button class="btn" onclick="testGitlab()">Test GitLab</button>
    <button class="btn" onclick="testLlm()">Test LLM</button>
    <button class="btn" onclick="toggleSetup()">Configure</button>
    <span id="testResult" style="margin-left:0.5rem;font-size:0.8rem"></span>
  </div>

  <!-- Config form (hidden) -->
  <div id="setupForm">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem 1rem">
      <label>GitLab URL<br><input id="cfgGitlabUrl" placeholder="https://gitlab.example.com"></label>
      <label>GitLab Token<br><input id="cfgGitlabToken" type="password" placeholder="glpat-xxx"></label>
      <label>Bot Username<br><input id="cfgBotUsername" placeholder="gitbot"></label>
      <label>Anthropic Key<br><input id="cfgAnthropicKey" type="password" placeholder="sk-ant-..."></label>
      <label>Gemini Key<br><input id="cfgGeminiKey" type="password" placeholder="AIza..."></label>
      <label>OpenAI Key<br><input id="cfgOpenaiKey" type="password" placeholder="sk-..."></label>
      <label>Ollama / vLLM URL<br><input id="cfgOllamaUrl" placeholder="http://localhost:11434"></label>
      <label>Active Provider<br>
        <select id="cfgLlmFamily">
          <option value="">First available key</option>
          <option value="anthropic">Anthropic (Claude)</option>
          <option value="gemini">Google Gemini</option>
          <option value="openai">OpenAI</option>
          <option value="ollama">Ollama / vLLM</option>
        </select>
      </label>
      <label>SSL Verify<br>
        <select id="cfgSslVerify"><option value="true">Yes</option><option value="false">No (self-signed)</option></select>
      </label>
    </div>
    <div style="margin-top:0.75rem">
      <button class="btn primary" onclick="saveConfig()">Save &amp; Restart Required</button>
      <span id="saveResult" style="margin-left:0.5rem;font-size:0.8rem"></span>
    </div>
  </div>

  <!-- Stats -->
  <div class="grid" id="statsGrid"></div>

  <!-- Workflow detail panel (shown when a workflow is selected) -->
  <div id="workflowDetail" class="detail-panel hidden">
    <div class="detail-header">
      <h3 id="detailTitle">Workflow</h3>
      <button class="btn" onclick="closeDetail()">Close</button>
    </div>
    <div class="detail-body">
      <div class="detail-meta" id="detailMeta"></div>
      <div id="detailPhases" class="phases"></div>
      <div id="detailGather" class="hidden" style="background:#0d1117;border:1px solid #21262d;border-radius:4px;padding:0.5rem;margin-bottom:0.75rem;font-size:0.75rem;color:#8b949e"></div>
      <div id="detailSteps"></div>
      <h2 style="font-size:0.85rem">Workflow Events</h2>
      <div class="events" id="detailEvents"></div>
    </div>
  </div>

  <!-- Workflows table -->
  <h2>Workflows <span id="wfCount" style="font-size:0.75rem;color:#484f58"></span></h2>
  <table>
    <thead><tr><th>Target</th><th>Project</th><th>Trigger</th><th>Steps</th><th>Time</th><th>Status</th></tr></thead>
    <tbody id="workflowTable"></tbody>
  </table>

  <!-- Event log -->
  <h2>Activity Feed</h2>
  <div class="events" id="eventLog"></div>
</div>

<script>
const API = '/admin/api';
let allEvents = [];
let allWorkflows = [];
let selectedWf = null;

function fmt(ts) { return new Date(ts * 1000).toLocaleTimeString(); }
function fmtDate(ts) { return new Date(ts * 1000).toLocaleString(); }
function dur(s) {
  if (s < 60) return `${Math.round(s)}s`;
  if (s < 3600) return `${Math.floor(s/60)}m ${Math.round(s%60)}s`;
  return `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m`;
}

function statusBadge(s) {
  const cls = s === 'completed' ? 'ok' : s === 'running' ? 'running' : 'error';
  return `<span class="badge ${cls}">${s}</span>`;
}

async function fetchStats() {
  try {
    const r = await fetch(`${API}/stats`);
    const d = await r.json();
    document.getElementById('statusDot').className = 'dot' + (d.config.gitlab_connected && d.config.llm_configured ? '' : ' error');
    document.getElementById('versionBadge').textContent = d.version ? `v${d.version}` : '';
    const banner = document.getElementById('setupBanner');
    const form = document.getElementById('setupForm');
    if (d.config.setup_needed) { banner.classList.remove('hidden'); form.classList.remove('hidden'); }
    else { banner.classList.add('hidden'); }

    document.getElementById('configRow').innerHTML = `
      <div class="config-item"><div class="label">GitLab</div>${d.config.gitlab_url} <span class="badge ${d.config.gitlab_connected?'ok':'error'}">${d.config.gitlab_connected?'connected':'no token'}</span></div>
      <div class="config-item"><div class="label">Bot</div>@${d.config.bot_username}</div>
      <div class="config-item"><div class="label">LLM</div>${d.config.llm_family} <span class="badge ${d.config.llm_configured?'ok':'error'}">${d.config.llm_configured?'ready':'no key'}</span></div>`;

    document.getElementById('statsGrid').innerHTML = `
      <div class="card"><div class="label">Uptime</div><div class="value">${dur(d.uptime_seconds)}</div></div>
      <div class="card"><div class="label">Webhooks</div><div class="value">${d.webhooks_received}</div><div class="sub">${d.webhooks_skipped} skipped</div></div>
      <div class="card"><div class="label">Workflows</div><div class="value">${d.workflows_completed + d.workflows_failed}</div><div class="sub">${d.workflows_completed} ok, ${d.workflows_failed} failed, ${d.active_workflows} active</div></div>
      <div class="card"><div class="label">Escalations</div><div class="value">${d.total_escalations}</div></div>`;
  } catch(e) {}
}

async function fetchAll() {
  try {
    const [evR, wfR, curR] = await Promise.all([
      fetch(`${API}/events?limit=200`),
      fetch(`${API}/workflows?limit=50`),
      fetch(`${API}/current`),
    ]);
    allEvents = await evR.json();
    const history = await wfR.json();
    const current = await curR.json();
    // Merge: current first (running), then history (deduped)
    const ids = new Set(current.map(w => w.id));
    allWorkflows = [...current, ...history.filter(w => !ids.has(w.id))];
    renderWorkflowTable();
    renderEventLog();
    if (selectedWf) renderDetail();
  } catch(e) {}
}

function renderWorkflowTable() {
  const el = document.getElementById('workflowTable');
  document.getElementById('wfCount').textContent = `(${allWorkflows.length})`;
  el.innerHTML = allWorkflows.map(w => `
    <tr class="clickable ${selectedWf === w.id ? 'selected' : ''}" onclick="selectWorkflow('${w.id}')">
      <td><strong>${w.target_url ? `<a href="${w.target_url}" target="_blank" onclick="event.stopPropagation()" style="color:inherit;text-decoration:underline dotted">${w.target}</a>` : w.target}</strong></td>
      <td style="color:#8b949e">${w.project}</td>
      <td>${w.trigger}</td>
      <td>${w.completed_steps}/${w.plan_steps}</td>
      <td>${dur(w.elapsed_seconds)}</td>
      <td>${statusBadge(w.status)}${w.escalations ? ' <span style="font-size:0.65rem;color:#9e6a03">+' + w.escalations + ' esc</span>' : ''}</td>
    </tr>
  `).join('');
}

function renderEventLog() {
  document.getElementById('eventLog').innerHTML = allEvents.slice(0, 50).map(e =>
    `<div class="event ${e.level}"><span class="ts">${fmt(e.timestamp)}</span>${e.workflow_id ? `<span style="color:#484f58">[${e.workflow_id}]</span> ` : ''}${e.message}</div>`
  ).join('');
}

function selectWorkflow(id) {
  selectedWf = id;
  document.getElementById('workflowDetail').classList.remove('hidden');
  renderDetail();
  renderWorkflowTable();
  document.getElementById('workflowDetail').scrollIntoView({behavior:'smooth', block:'start'});
}

function closeDetail() {
  selectedWf = null;
  document.getElementById('workflowDetail').classList.add('hidden');
  renderWorkflowTable();
}

function renderDetail() {
  const wf = allWorkflows.find(w => w.id === selectedWf);
  if (!wf) return;

  document.getElementById('detailTitle').innerHTML = wf.target_url
    ? `<a href="${wf.target_url}" target="_blank" style="color:inherit">${wf.target} ↗</a>`
    : `${wf.target}`;
  document.getElementById('detailMeta').innerHTML = `
    ${statusBadge(wf.status)}
    <span>Project: <strong>${wf.project}</strong></span>
    <span>Trigger: ${wf.trigger}</span>
    <span>Started: ${fmtDate(wf.started)}</span>
    <span>Duration: ${dur(wf.elapsed_seconds)}</span>
    <span>Steps: ${wf.completed_steps}/${wf.plan_steps}</span>
    <span>Models: ${(wf.models_used||[]).join(', ') || '-'}</span>
    ${wf.error ? `<span style="color:#f85149">Error: ${wf.error.substring(0,80)}</span>` : ''}
  `;

  // Phase timeline
  const phases = wf.phases || [];
  const allPhases = ['gather', 'plan', 'execute'];
  const currentPhaseIdx = phases.length - 1;
  document.getElementById('detailPhases').innerHTML = allPhases.map((p, i) => {
    const cls = i < phases.length ? (wf.status === 'running' && i === currentPhaseIdx ? 'active' : 'done') : 'pending';
    return `<div class="phase ${cls}">${p}</div>`;
  }).join('');

  // Gather summary
  const gatherEl = document.getElementById('detailGather');
  if (wf.gather_summary) {
    gatherEl.classList.remove('hidden');
    gatherEl.innerHTML = `<strong>Gather summary:</strong> ${wf.gather_summary}`;
  } else {
    gatherEl.classList.add('hidden');
  }

  // Steps
  const steps = wf.steps || [];
  document.getElementById('detailSteps').innerHTML = steps.length ? steps.map(s => `
    <div class="step ${s.status}">
      <div class="step-header" onclick="this.nextElementSibling.classList.toggle('open')">
        <span class="step-title">
          <span style="color:#484f58">${s.number}.</span>
          ${s.description.substring(0, 80)}${s.description.length > 80 ? '...' : ''}
          ${s.escalated ? '<span class="badge warn">escalated</span>' : ''}
        </span>
        <span class="step-meta">
          <span class="badge ${s.status === 'completed' ? 'ok' : s.status === 'running' ? 'running' : 'error'}">${s.status}</span>
          <span>${s.tier}</span>
          <span style="color:#d2a8ff">${s.model.split('/').pop()}</span>
          <span>${s.tools_count} tools</span>
          <span>${dur(s.elapsed_seconds)}</span>
        </span>
      </div>
      <div class="step-body">
        <div style="margin-bottom:0.5rem;color:#8b949e">${s.description}</div>
        ${s.actions.length ? s.actions.map(a => `
          <div class="action ${a.error ? 'error' : ''}">
            <span class="tool-name">${a.error ? 'FAILED ' : ''}${a.tool}</span>
            <span class="result">${a.result_preview || '(no output)'}</span>
          </div>
        `).join('') : '<div style="color:#484f58">No actions recorded</div>'}
      </div>
    </div>
  `).join('') : '<div style="color:#484f58;font-size:0.8rem;padding:0.5rem">No step details (workflow may predate step tracking)</div>';

  // Workflow events
  const wfEvents = allEvents.filter(e => e.workflow_id === selectedWf);
  document.getElementById('detailEvents').innerHTML = wfEvents.length
    ? wfEvents.map(e => `<div class="event ${e.level}"><span class="ts">${fmt(e.timestamp)}</span> ${e.message}</div>`).join('')
    : '<div style="color:#484f58;padding:0.5rem">No events</div>';
}

async function testGitlab() {
  const el = document.getElementById('testResult');
  el.textContent = 'Testing...';
  try {
    const r = await fetch(`${API}/test-gitlab`, {method:'POST'});
    const d = await r.json();
    el.innerHTML = d.status === 'ok' ? `<span class="badge ok">GitLab OK: @${d.user}</span>` : `<span class="badge error">${d.error}</span>`;
  } catch(e) { el.innerHTML = `<span class="badge error">${e}</span>`; }
}

async function testLlm() {
  const el = document.getElementById('testResult');
  el.textContent = 'Testing...';
  try {
    const r = await fetch(`${API}/test-llm`, {method:'POST'});
    const d = await r.json();
    el.innerHTML = d.status === 'ok' ? `<span class="badge ok">LLM OK (${d.model})</span>` : `<span class="badge error">${d.error}</span>`;
  } catch(e) { el.innerHTML = `<span class="badge error">${e}</span>`; }
}

function toggleSetup() {
  document.getElementById('setupForm').classList.toggle('hidden');
}

async function saveConfig() {
  const el = document.getElementById('saveResult');
  el.textContent = 'Saving...';
  const data = {
    gitlab_url: document.getElementById('cfgGitlabUrl').value,
    gitlab_token: document.getElementById('cfgGitlabToken').value,
    bot_username: document.getElementById('cfgBotUsername').value || 'gitbot',
    anthropic_api_key: document.getElementById('cfgAnthropicKey').value,
    gemini_api_key: document.getElementById('cfgGeminiKey').value,
    openai_api_key: document.getElementById('cfgOpenaiKey').value,
    ollama_url: document.getElementById('cfgOllamaUrl').value,
    llm_family: document.getElementById('cfgLlmFamily').value,
    gitlab_ssl_verify: document.getElementById('cfgSslVerify').value,
  };
  Object.keys(data).forEach(k => { if (!data[k]) delete data[k]; });
  try {
    const r = await fetch(`${API}/save-config`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
    const d = await r.json();
    el.innerHTML = d.status === 'ok' ? `<span class="badge ok">${d.message}</span>` : `<span class="badge error">${d.error}</span>`;
  } catch(e) { el.innerHTML = `<span class="badge error">${e}</span>`; }
}

function refresh() { fetchStats(); fetchAll(); }
refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
