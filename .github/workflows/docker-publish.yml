name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Build platforms'
        default: 'linux/amd64'
        type: choice
        options:
          - linux/amd64
          - linux/amd64,linux/arm64

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Extract version from tag
        id: version
        run: |
          REF="${GITHUB_REF_NAME}"
          VERSION="${REF#v}"
          # For workflow_dispatch without a tag, use latest tag
          if [[ "$VERSION" == "$REF" ]]; then
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "dev")
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Update version file
        run: echo "${{ steps.version.outputs.VERSION }}" > version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            awkto/gitbot:${{ steps.version.outputs.VERSION }}
            awkto/gitbot:latest
          platforms: ${{ inputs.platforms || 'linux/amd64' }}
